<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1100" viewBox="0 0 1600 1100" role="img" aria-labelledby="title desc">
  <title id="title">SleepCheck architecture</title>
  <desc id="desc">Client-heavy SleepCheck architecture: Next.js UI, browser domain (AudioEngine, TTS, storage), PWA and device layer, CI, and AI in Action parent brand.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0c1220"/>
      <stop offset="55%" stop-color="#0a101c"/>
      <stop offset="100%" stop-color="#070b14"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#121a2b"/>
      <stop offset="100%" stop-color="#0e1524"/>
    </linearGradient>
    <linearGradient id="chip" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#182234"/>
      <stop offset="100%" stop-color="#121a2a"/>
    </linearGradient>
    <filter id="soft" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="1600" height="1100" fill="url(#bg)"/>

  <text x="72" y="78" fill="#f3f5f8" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="42" font-weight="700">SleepCheck - architecture</text>
  <text x="72" y="118" fill="#9aa7bd" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="22">One rule: the browser owns the domain - audio, prefs, and speech stay on-device</text>

  <g filter="url(#soft)">
    <rect x="60" y="170" width="460" height="520" rx="22" fill="url(#card)" stroke="#3d6fd8" stroke-width="2.5"/>
  </g>
  <text x="88" y="220" fill="#ffffff" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="26" font-weight="700">Next.js App Router</text>
  <text x="88" y="252" fill="#8fa0ba" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="16">TypeScript / Tailwind v4 / Vercel</text>

  <rect x="88" y="280" width="404" height="56" rx="12" fill="url(#chip)" stroke="#2a3a55" stroke-width="1.5"/>
  <text x="110" y="315" fill="#e8eef8" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="18">SleepApp shell - player-first UI</text>

  <rect x="88" y="352" width="404" height="56" rx="12" fill="url(#chip)" stroke="#2a3a55" stroke-width="1.5"/>
  <text x="110" y="387" fill="#e8eef8" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="18">Scenes / Mix / Stories / Breathe</text>

  <rect x="88" y="424" width="404" height="56" rx="12" fill="url(#chip)" stroke="#2a3a55" stroke-width="1.5"/>
  <text x="110" y="459" fill="#e8eef8" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="18">Sleep timer / streaks / share cards</text>

  <rect x="88" y="496" width="404" height="56" rx="12" fill="url(#chip)" stroke="#2a3a55" stroke-width="1.5"/>
  <text x="110" y="531" fill="#e8eef8" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="18">Brand lockup to weidong-shi.com</text>

  <text x="88" y="600" fill="#7f93b0" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="15" font-style="italic">Presentation only - no cloud domain service</text>
  <text x="88" y="628" fill="#7f93b0" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="15" font-style="italic">Wellness UX, not clinical tracking</text>

  <line x1="520" y1="420" x2="600" y2="420" stroke="#3ecf8e" stroke-width="3"/>
  <polygon points="600,420 586,412 586,428" fill="#3ecf8e"/>
  <text x="530" y="400" fill="#3ecf8e" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="15" font-weight="700">calls</text>
  <text x="528" y="448" fill="#8fa0ba" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="14">in-browser</text>

  <g filter="url(#soft)">
    <rect x="610" y="170" width="500" height="520" rx="22" fill="url(#card)" stroke="#3ecf8e" stroke-width="2.5"/>
  </g>
  <text x="638" y="220" fill="#ffffff" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="26" font-weight="700">Client domain (browser)</text>
  <text x="638" y="252" fill="#8fa0ba" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="16">Pure product logic - no backend API</text>

  <rect x="638" y="280" width="444" height="52" rx="12" fill="url(#chip)" stroke="#2f5a48" stroke-width="1.5"/>
  <text x="658" y="313" fill="#e8eef8" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="17">AudioEngine - Web Audio API</text>

  <rect x="638" y="346" width="214" height="52" rx="12" fill="url(#chip)" stroke="#2f5a48" stroke-width="1.5"/>
  <text x="656" y="379" fill="#e8eef8" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="16">Sampled loops</text>

  <rect x="868" y="346" width="214" height="52" rx="12" fill="url(#chip)" stroke="#2f5a48" stroke-width="1.5"/>
  <text x="886" y="379" fill="#e8eef8" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="16">Live synth / FX</text>

  <rect x="638" y="412" width="214" height="52" rx="12" fill="url(#chip)" stroke="#2f5a48" stroke-width="1.5"/>
  <text x="656" y="445" fill="#e8eef8" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="16">Gapless crossfade</text>

  <rect x="868" y="412" width="214" height="52" rx="12" fill="url(#chip)" stroke="#2f5a48" stroke-width="1.5"/>
  <text x="886" y="445" fill="#e8eef8" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="16">Fade-to-silence</text>

  <rect x="638" y="478" width="214" height="52" rx="12" fill="url(#chip)" stroke="#2f5a48" stroke-width="1.5"/>
  <text x="656" y="511" fill="#e8eef8" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="16">speechSynthesis TTS</text>

  <rect x="868" y="478" width="214" height="52" rx="12" fill="url(#chip)" stroke="#2f5a48" stroke-width="1.5"/>
  <text x="886" y="511" fill="#e8eef8" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="16">prefs + streak schema</text>

  <text x="638" y="580" fill="#3ecf8e" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="15" font-style="italic">All domain rules stay on-device</text>
  <text x="638" y="608" fill="#3ecf8e" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="15" font-style="italic">No account / no cloud sleep data</text>

  <line x1="1110" y1="420" x2="1190" y2="420" stroke="#3ecf8e" stroke-width="3"/>
  <polygon points="1190,420 1176,412 1176,428" fill="#3ecf8e"/>
  <text x="1122" y="400" fill="#3ecf8e" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="15" font-weight="700">uses</text>
  <text x="1118" y="448" fill="#8fa0ba" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="14">device APIs</text>

  <g filter="url(#soft)">
    <rect x="1200" y="170" width="340" height="520" rx="22" fill="url(#card)" stroke="#3d6fd8" stroke-width="2.5"/>
  </g>
  <text x="1228" y="220" fill="#ffffff" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="24" font-weight="700">Device and PWA</text>
  <text x="1228" y="252" fill="#8fa0ba" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="15">Offline-capable runtime</text>

  <rect x="1228" y="280" width="284" height="56" rx="12" fill="url(#chip)" stroke="#2a3a55" stroke-width="1.5"/>
  <text x="1248" y="315" fill="#e8eef8" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="17">Service worker</text>

  <rect x="1228" y="352" width="284" height="56" rx="12" fill="url(#chip)" stroke="#2a3a55" stroke-width="1.5"/>
  <text x="1248" y="387" fill="#e8eef8" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="17">App shell + audio cache</text>

  <rect x="1228" y="424" width="284" height="56" rx="12" fill="url(#chip)" stroke="#2a3a55" stroke-width="1.5"/>
  <text x="1248" y="459" fill="#e8eef8" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="17">localStorage</text>

  <rect x="1228" y="496" width="284" height="56" rx="12" fill="url(#chip)" stroke="#2a3a55" stroke-width="1.5"/>
  <text x="1248" y="531" fill="#e8eef8" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="17">Media Session / lock screen</text>

  <text x="1228" y="608" fill="#7f93b0" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="14" font-style="italic">Installable / share via ?mix=</text>

  <g filter="url(#soft)">
    <rect x="60" y="740" width="460" height="200" rx="22" fill="url(#card)" stroke="#3ecf8e" stroke-width="2.5"/>
  </g>
  <text x="88" y="790" fill="#ffffff" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="22" font-weight="700">Offline audio pipeline</text>
  <text x="88" y="822" fill="#8fa0ba" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="15">Python DSP to seamless MP3 loops</text>
  <rect x="88" y="848" width="404" height="48" rx="12" fill="url(#chip)" stroke="#2f5a48" stroke-width="1.5"/>
  <text x="108" y="879" fill="#e8eef8" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="16">scripts/gen_audio.py to public/audio/*</text>
  <text x="88" y="925" fill="#3ecf8e" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="14" font-style="italic">Mathematically gapless loops before runtime</text>

  <line x1="290" y1="690" x2="290" y2="740" stroke="#5a6d88" stroke-width="2" stroke-dasharray="6 6"/>

  <g filter="url(#soft)">
    <rect x="560" y="740" width="520" height="200" rx="22" fill="url(#card)" stroke="#3d6fd8" stroke-width="2.5"/>
  </g>
  <text x="588" y="790" fill="#ffffff" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="22" font-weight="700">Quality gate</text>
  <text x="588" y="822" fill="#8fa0ba" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="15">Human review + automated checks</text>
  <rect x="588" y="848" width="230" height="48" rx="12" fill="url(#chip)" stroke="#2a3a55" stroke-width="1.5"/>
  <text x="608" y="879" fill="#e8eef8" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="16">lint / typecheck / build</text>
  <rect x="834" y="848" width="220" height="48" rx="12" fill="url(#chip)" stroke="#2a3a55" stroke-width="1.5"/>
  <text x="854" y="879" fill="#e8eef8" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="16">Soak listen / a11y pass</text>
  <text x="588" y="925" fill="#7f93b0" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="14" font-style="italic">AI drafts / humans validate sensory UX</text>

  <line x1="820" y1="690" x2="820" y2="740" stroke="#5a6d88" stroke-width="2" stroke-dasharray="6 6"/>

  <g filter="url(#soft)">
    <rect x="1120" y="740" width="420" height="200" rx="22" fill="url(#card)" stroke="#3ecf8e" stroke-width="2.5"/>
  </g>
  <text x="1148" y="790" fill="#ffffff" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="22" font-weight="700">AI in Action hub</text>
  <text x="1148" y="822" fill="#8fa0ba" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="15">Parent brand / series case studies</text>
  <rect x="1148" y="848" width="364" height="48" rx="12" fill="url(#chip)" stroke="#2f5a48" stroke-width="1.5"/>
  <text x="1168" y="879" fill="#e8eef8" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="16">weidong-shi.com / RetireCheck sibling</text>
  <text x="1148" y="925" fill="#3ecf8e" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="14" font-style="italic">Shared WS mark / series chrome</text>

  <text x="800" y="1048" text-anchor="middle" fill="#6b7c96" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="16">sleepcheck.weidong-shi.com / built with Cursor / AI in Action #2</text>
</svg>
