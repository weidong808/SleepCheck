<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#16222b"/>
      <stop offset="0.55" stop-color="#101c19"/>
      <stop offset="1" stop-color="#0a0d0b"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.72" cy="0.24" r="0.5">
      <stop offset="0" stop-color="#e9edda" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#e9edda" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="200" height="200" rx="40" fill="url(#bg)"/>
  <rect x="1.5" y="1.5" width="197" height="197" rx="38.5" fill="none" stroke="#3ecf8e" stroke-opacity="0.35" stroke-width="3"/>
  <rect width="200" height="200" rx="40" fill="url(#glow)"/>
  <!-- small moon -->
  <circle cx="148" cy="48" r="14" fill="#e9edda" opacity="0.9"/>
  <circle cx="154" cy="43" r="12.5" fill="#132028"/>
  <!-- stars -->
  <circle cx="52" cy="42" r="2" fill="#d5dccc" opacity="0.7"/>
  <circle cx="86" cy="60" r="1.5" fill="#d5dccc" opacity="0.5"/>
  <circle cx="170" cy="86" r="1.6" fill="#d5dccc" opacity="0.55"/>
  <!-- monogram -->
  <text x="100" y="138" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="86" fill="#f3f3f1">WS<tspan fill="#3ecf8e">.</tspan></text>
  <!-- baseline accent -->
  <line x1="56" y1="160" x2="144" y2="160" stroke="#d9a13e" stroke-width="3" stroke-linecap="round" opacity="0.8"/>
</svg>
