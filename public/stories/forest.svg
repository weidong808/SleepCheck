<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#17252c"/>
      <stop offset="0.55" stop-color="#101c19"/>
      <stop offset="1" stop-color="#090d0b"/>
    </linearGradient>
    <radialGradient id="moon" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#dfe8dc" stop-opacity="0.32"/>
      <stop offset="1" stop-color="#dfe8dc" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="lamp" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#f0c26a" stop-opacity="0.85"/>
      <stop offset="0.35" stop-color="#d9a13e" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#d9a13e" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="800" height="500" fill="url(#sky)"/>
  <circle cx="640" cy="90" r="120" fill="url(#moon)"/>
  <circle cx="640" cy="90" r="26" fill="#dfe8dc" opacity="0.55"/>
  <!-- far treeline -->
  <path fill="#0f1a16" d="M0 260 L40 190 L80 260 L110 205 L150 260 L185 180 L225 260 L260 200 L300 260 L340 185 L380 260 L420 210 L455 260 L495 175 L540 260 L575 205 L615 260 L655 190 L700 260 L740 215 L775 260 L800 230 L800 500 L0 500 Z"/>
  <!-- mid pines -->
  <g fill="#0b120e">
    <path d="M60 330 L110 200 L160 330 Z"/>
    <path d="M45 380 L110 260 L175 380 Z"/>
    <path d="M250 340 L300 210 L350 340 Z"/>
    <path d="M235 395 L300 275 L365 395 Z"/>
    <path d="M560 335 L610 205 L660 335 Z"/>
    <path d="M545 390 L610 270 L675 390 Z"/>
    <path d="M700 350 L750 225 L800 350 Z"/>
  </g>
  <!-- near pines -->
  <g fill="#060a08">
    <path d="M-20 460 L70 260 L160 460 Z"/>
    <path d="M640 470 L730 265 L820 470 Z"/>
    <path d="M380 470 L455 300 L530 470 Z"/>
  </g>
  <!-- mossy ground -->
  <path fill="#0a0f0b" d="M0 430 Q200 410 400 428 T800 425 L800 500 L0 500 Z"/>
  <!-- path -->
  <path fill="#11150f" d="M330 500 Q345 460 340 430 Q338 415 330 405 L360 405 Q356 420 358 435 Q362 465 390 500 Z"/>
  <!-- lantern -->
  <circle cx="345" cy="398" r="52" fill="url(#lamp)"/>
  <circle cx="345" cy="398" r="6" fill="#f2cd82"/>
  <rect x="343" y="384" width="4" height="10" fill="#241d10"/>
  <!-- gentle rain -->
  <g stroke="#a9c8c0" stroke-opacity="0.10" stroke-width="1.4" stroke-linecap="round">
    <line x1="120" y1="60" x2="112" y2="98"/>
    <line x1="230" y1="120" x2="222" y2="158"/>
    <line x1="320" y1="50" x2="312" y2="88"/>
    <line x1="450" y1="110" x2="442" y2="148"/>
    <line x1="540" y1="40" x2="532" y2="78"/>
    <line x1="700" y1="140" x2="692" y2="178"/>
    <line x1="170" y1="200" x2="162" y2="238"/>
    <line x1="610" y1="180" x2="602" y2="218"/>
    <line x1="80" y1="130" x2="72" y2="168"/>
    <line x1="400" y1="170" x2="392" y2="208"/>
  </g>
</svg>
