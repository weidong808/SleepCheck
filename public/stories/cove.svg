<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#111a2b"/>
      <stop offset="0.6" stop-color="#0d1420"/>
      <stop offset="1" stop-color="#0a0e15"/>
    </linearGradient>
    <linearGradient id="sea" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#101b2a"/>
      <stop offset="1" stop-color="#080c12"/>
    </linearGradient>
    <radialGradient id="moonglow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#e9edda" stop-opacity="0.4"/>
      <stop offset="1" stop-color="#e9edda" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="moonpath" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#e9edda" stop-opacity="0.30"/>
      <stop offset="1" stop-color="#e9edda" stop-opacity="0.03"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#sky)"/>
  <circle cx="400" cy="110" r="150" fill="url(#moonglow)"/>
  <circle cx="400" cy="110" r="38" fill="#e9edda" opacity="0.85"/>
  <circle cx="388" cy="100" r="6" fill="#d3d8c4" opacity="0.5"/>
  <circle cx="412" cy="122" r="4" fill="#d3d8c4" opacity="0.4"/>
  <!-- stars -->
  <g fill="#cfd8cf">
    <circle cx="90" cy="60" r="1.4" opacity="0.7"/>
    <circle cx="160" cy="120" r="1.1" opacity="0.5"/>
    <circle cx="250" cy="45" r="1.3" opacity="0.6"/>
    <circle cx="560" cy="70" r="1.2" opacity="0.6"/>
    <circle cx="660" cy="40" r="1.4" opacity="0.7"/>
    <circle cx="720" cy="120" r="1.1" opacity="0.5"/>
  </g>
  <!-- sea -->
  <rect y="285" width="800" height="215" fill="url(#sea)"/>
  <!-- moon path on water -->
  <polygon points="372,285 428,285 460,500 340,500" fill="url(#moonpath)"/>
  <g stroke="#e9edda" stroke-width="2" stroke-linecap="round">
    <line x1="380" y1="300" x2="424" y2="300" opacity="0.35"/>
    <line x1="368" y1="322" x2="430" y2="322" opacity="0.28"/>
    <line x1="382" y1="348" x2="440" y2="348" opacity="0.22"/>
    <line x1="360" y1="380" x2="446" y2="380" opacity="0.16"/>
    <line x1="372" y1="420" x2="458" y2="420" opacity="0.12"/>
  </g>
  <!-- gentle wave lines -->
  <g stroke="#31465c" stroke-width="1.5" fill="none" opacity="0.5">
    <path d="M60 320 Q110 314 160 320 T260 320"/>
    <path d="M540 340 Q590 334 640 340 T740 340"/>
    <path d="M100 396 Q160 390 220 396 T340 396"/>
    <path d="M500 430 Q560 424 620 430 T740 430"/>
  </g>
  <!-- cliffs -->
  <path fill="#0a0f14" d="M0 500 L0 180 Q60 200 90 260 Q130 330 150 500 Z"/>
  <path fill="#0a0f14" d="M800 500 L800 150 Q740 180 705 250 Q660 340 645 500 Z"/>
  <!-- beach -->
  <path fill="#12100c" d="M0 500 L0 465 Q220 440 400 452 Q600 462 800 448 L800 500 Z"/>
</svg>
