<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#141d33"/>
      <stop offset="0.65" stop-color="#0f1524"/>
      <stop offset="1" stop-color="#0b0e16"/>
    </linearGradient>
    <radialGradient id="winglow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#f0c26a" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#f0c26a" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="800" height="500" fill="url(#sky)"/>
  <!-- mountains -->
  <path fill="#101828" d="M0 300 L150 130 L300 300 Z"/>
  <path fill="#0d1420" d="M180 320 L390 90 L600 320 Z"/>
  <path fill="#101828" d="M520 310 L680 150 L800 310 Z"/>
  <!-- snow caps -->
  <path fill="#2a3a55" d="M355 130 L390 90 L425 130 L405 128 L390 145 L372 126 Z" opacity="0.8"/>
  <!-- snowy ground -->
  <path fill="#1b2438" d="M0 420 Q200 395 420 412 T800 405 L800 500 L0 500 Z"/>
  <!-- pines -->
  <g fill="#0a101a">
    <path d="M80 430 L125 320 L170 430 Z"/>
    <path d="M65 465 L125 370 L185 465 Z"/>
    <path d="M660 440 L705 330 L750 440 Z"/>
    <path d="M645 475 L705 380 L765 475 Z"/>
  </g>
  <!-- cottage -->
  <g>
    <rect x="330" y="330" width="150" height="95" fill="#0b0e16"/>
    <path d="M315 335 L405 265 L495 335 Z" fill="#080b12"/>
    <path d="M323 329 L405 266 L487 329 L480 322 L405 275 L330 322 Z" fill="#2a3a55" opacity="0.9"/>
    <rect x="440" y="280" width="16" height="42" fill="#0b0e16"/>
    <path d="M448 272 q14 -18 6 -34 q22 12 12 40 q-8 8 -18 -6Z" fill="#3b4a63" opacity="0.35"/>
    <circle cx="365" cy="372" r="34" fill="url(#winglow)"/>
    <circle cx="445" cy="372" r="34" fill="url(#winglow)"/>
    <rect x="352" y="358" width="26" height="28" fill="#e9b45a" opacity="0.92"/>
    <rect x="432" y="358" width="26" height="28" fill="#e9b45a" opacity="0.92"/>
    <line x1="365" y1="358" x2="365" y2="386" stroke="#0b0e16" stroke-width="2"/>
    <line x1="352" y1="372" x2="378" y2="372" stroke="#0b0e16" stroke-width="2"/>
    <line x1="445" y1="358" x2="445" y2="386" stroke="#0b0e16" stroke-width="2"/>
    <line x1="432" y1="372" x2="458" y2="372" stroke="#0b0e16" stroke-width="2"/>
    <rect x="396" y="382" width="20" height="43" fill="#060810"/>
  </g>
  <!-- warm light spill on snow -->
  <ellipse cx="405" cy="432" rx="120" ry="16" fill="#e9b45a" opacity="0.07"/>
  <!-- falling snow -->
  <g fill="#c8d2e4">
    <circle cx="60" cy="80" r="2" opacity="0.6"/><circle cx="140" cy="180" r="1.6" opacity="0.5"/>
    <circle cx="220" cy="60" r="2.2" opacity="0.65"/><circle cx="300" cy="150" r="1.5" opacity="0.5"/>
    <circle cx="380" cy="40" r="2" opacity="0.6"/><circle cx="460" cy="120" r="1.7" opacity="0.55"/>
    <circle cx="540" cy="70" r="2.1" opacity="0.6"/><circle cx="620" cy="170" r="1.5" opacity="0.5"/>
    <circle cx="700" cy="90" r="2" opacity="0.6"/><circle cx="760" cy="200" r="1.6" opacity="0.5"/>
    <circle cx="100" cy="280" r="1.8" opacity="0.5"/><circle cx="250" cy="240" r="1.5" opacity="0.45"/>
    <circle cx="520" cy="250" r="1.8" opacity="0.5"/><circle cx="680" cy="300" r="1.5" opacity="0.45"/>
    <circle cx="180" cy="350" r="1.6" opacity="0.4"/><circle cx="600" cy="380" r="1.7" opacity="0.4"/>
    <circle cx="330" cy="200" r="1.4" opacity="0.45"/><circle cx="740" cy="340" r="1.5" opacity="0.4"/>
  </g>
