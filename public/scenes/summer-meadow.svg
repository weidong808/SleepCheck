<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#101c26"/>
      <stop offset="0.55" stop-color="#0e1a17"/>
      <stop offset="1" stop-color="#0b110b"/>
    </linearGradient>
    <radialGradient id="mg" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#e8ecd8" stop-opacity="0.3"/>
      <stop offset="1" stop-color="#e8ecd8" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="800" height="500" fill="url(#sky)"/>
  <circle cx="620" cy="110" r="140" fill="url(#mg)"/>
  <circle cx="620" cy="110" r="34" fill="#e8ecd8" opacity="0.85"/>
  <!-- stars -->
  <g fill="#d2dacb">
    <circle cx="100" cy="60" r="1.4" opacity="0.7"/><circle cx="220" cy="100" r="1.1" opacity="0.5"/>
    <circle cx="330" cy="55" r="1.3" opacity="0.6"/><circle cx="450" cy="90" r="1.2" opacity="0.55"/>
    <circle cx="740" cy="70" r="1.2" opacity="0.55"/><circle cx="60" cy="140" r="1.2" opacity="0.5"/>
  </g>
  <!-- distant treeline -->
  <path fill="#0c130e" d="M0 300 Q60 280 120 296 Q180 310 240 292 Q300 276 360 294 Q430 312 500 294 Q570 278 640 296 Q720 312 800 292 L800 500 L0 500 Z"/>
