  <path fill="#0e1810" d="M0 360 Q200 330 420 352 T800 344 L800 500 L0 500 Z"/>
  <path fill="#0a120a" d="M0 420 Q240 392 480 412 T800 404 L800 500 L0 500 Z"/>
  <!-- grass blades foreground -->
  <g stroke="#152112" stroke-width="2.5" stroke-linecap="round" fill="none">
    <path d="M60 500 q-6 -34 -18 -48"/><path d="M72 500 q0 -38 8 -52"/><path d="M84 500 q8 -30 20 -42"/>
    <path d="M240 500 q-6 -30 -16 -44"/><path d="M252 500 q2 -36 10 -48"/>
    <path d="M420 500 q-8 -32 -18 -44"/><path d="M432 500 q0 -38 8 -50"/><path d="M444 500 q8 -28 18 -38"/>
    <path d="M600 500 q-6 -34 -16 -46"/><path d="M612 500 q2 -38 10 -50"/>
    <path d="M740 500 q-6 -30 -14 -42"/><path d="M752 500 q4 -34 12 -46"/>
  </g>
  <!-- wildflowers -->
  <g fill="#c9d3bd" opacity="0.6">
    <circle cx="150" cy="452" r="3"/><circle cx="330" cy="462" r="2.6"/><circle cx="520" cy="448" r="3"/><circle cx="690" cy="458" r="2.6"/>
  </g>
  <!-- fireflies -->
  <g>
    <circle cx="180" cy="380" r="2.4" fill="#3ecf8e" opacity="0.85"/>
    <circle cx="270" cy="340" r="1.8" fill="#d9a13e" opacity="0.8"/>
    <circle cx="360" cy="392" r="2" fill="#3ecf8e" opacity="0.7"/>
    <circle cx="470" cy="352" r="1.7" fill="#3ecf8e" opacity="0.65"/>
    <circle cx="560" cy="386" r="2.2" fill="#d9a13e" opacity="0.75"/>
    <circle cx="650" cy="342" r="1.8" fill="#3ecf8e" opacity="0.7"/>
    <circle cx="740" cy="380" r="2" fill="#3ecf8e" opacity="0.75"/>
    <circle cx="100" cy="330" r="1.6" fill="#d9a13e" opacity="0.6"/>
  </g>
</svg>
