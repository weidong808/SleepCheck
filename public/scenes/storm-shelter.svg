<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#131a24"/>
      <stop offset="0.5" stop-color="#0e131b"/>
      <stop offset="1" stop-color="#0a0c0e"/>
    </linearGradient>
    <radialGradient id="winglow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#f0c26a" stop-opacity="0.65"/>
      <stop offset="1" stop-color="#f0c26a" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="800" height="500" fill="url(#sky)"/>
  <!-- heavy layered clouds -->
  <ellipse cx="150" cy="60" rx="260" ry="55" fill="#0b1017" opacity="0.9"/>
  <ellipse cx="480" cy="45" rx="300" ry="60" fill="#0c1119" opacity="0.85"/>
  <ellipse cx="740" cy="75" rx="240" ry="50" fill="#0b1017" opacity="0.9"/>
  <ellipse cx="320" cy="110" rx="280" ry="40" fill="#0d1219" opacity="0.7"/>
  <!-- hill -->
  <path fill="#0b0f0b" d="M0 400 Q200 350 430 372 Q640 392 800 366 L800 500 L0 500 Z"/>
  <!-- wind-bent trees -->
  <g fill="#080b08">
    <path d="M120 392 Q116 350 96 322 Q130 340 142 316 Q146 344 168 352 Q140 356 138 392 Z"/>
    <path d="M660 372 Q656 334 638 310 Q668 326 678 304 Q682 330 702 338 Q676 342 674 372 Z"/>
  </g>
  <!-- streaks of wind -->
  <g stroke="#7f95a5" stroke-opacity="0.12" stroke-width="2" stroke-linecap="round" fill="none">
    <path d="M40 200 q60 -10 120 0"/>
    <path d="M540 170 q70 -12 140 -2"/>
    <path d="M240 250 q80 -14 160 -2"/>
  </g>
  <!-- small sheltered house -->
  <g>
    <rect x="380" y="330" width="120" height="70" fill="#0a0c10"/>
    <path d="M366 334 L440 280 L514 334 Z" fill="#07090c"/>
    <rect x="466" y="292" width="13" height="34" fill="#0a0c10"/>
    <circle cx="424" cy="362" r="30" fill="url(#winglow)"/>
    <rect x="412" y="349" width="24" height="26" fill="#e9b45a" opacity="0.95"/>
    <line x1="424" y1="349" x2="424" y2="375" stroke="#0a0c10" stroke-width="2"/>
    <line x1="412" y1="362" x2="436" y2="362" stroke="#0a0c10" stroke-width="2"/>
    <ellipse cx="440" cy="408" rx="90" ry="10" fill="#e9b45a" opacity="0.06"/>
  </g>
  <!-- driving rain, steeper angle, denser -->
  <g stroke="#9fbdb5" stroke-opacity="0.2" stroke-width="1.6" stroke-linecap="round">
    <line x1="60" y1="100" x2="42" y2="150"/><line x1="130" y1="150" x2="112" y2="200"/>
    <line x1="200" y1="90" x2="182" y2="140"/><line x1="270" y1="160" x2="252" y2="210"/>
    <line x1="340" y1="100" x2="322" y2="150"/><line x1="410" y1="150" x2="392" y2="200"/>
    <line x1="480" y1="95" x2="462" y2="145"/><line x1="550" y1="155" x2="532" y2="205"/>
    <line x1="620" y1="100" x2="602" y2="150"/><line x1="690" y1="150" x2="672" y2="200"/>
    <line x1="760" y1="95" x2="742" y2="145"/><line x1="100" y1="240" x2="82" y2="290"/>
    <line x1="240" y1="280" x2="222" y2="330"/><line x1="330" y1="230" x2="312" y2="280"/>
    <line x1="580" y1="250" x2="562" y2="300"/><line x1="700" y1="280" x2="682" y2="330"/>
    <line x1="770" y1="230" x2="752" y2="280"/><line x1="170" y1="320" x2="152" y2="370"/>
    <line x1="620" y1="330" x2="602" y2="380"/><line x1="60" y1="360" x2="42" y2="410"/>
  </g>
</svg>
