<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#121d24"/>
      <stop offset="0.55" stop-color="#0e1817"/>
      <stop offset="1" stop-color="#0a0f0c"/>
    </linearGradient>
    <linearGradient id="water" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1a2b3a"/>
      <stop offset="1" stop-color="#0d151d"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#sky)"/>
  <!-- crescent moon -->
  <circle cx="150" cy="90" r="34" fill="#e7e9d3" opacity="0.85"/>
  <circle cx="164" cy="78" r="31" fill="#121d24"/>
  <!-- stars -->
  <g fill="#cfd8cd">
    <circle cx="300" cy="60" r="1.3" opacity="0.6"/><circle cx="420" cy="45" r="1.2" opacity="0.55"/>
    <circle cx="540" cy="80" r="1.4" opacity="0.6"/><circle cx="660" cy="55" r="1.1" opacity="0.5"/>
    <circle cx="730" cy="110" r="1.3" opacity="0.55"/><circle cx="240" cy="110" r="1.1" opacity="0.5"/>
  </g>
  <!-- far bank / trees -->
  <path fill="#0c130e" d="M0 280 Q100 258 200 274 Q320 292 440 272 Q580 252 700 272 Q760 280 800 274 L800 500 L0 500 Z"/>
  <!-- winding creek -->
  <path fill="url(#water)" d="M355 280 Q380 300 350 330 Q310 368 350 404 Q400 444 360 500 L520 500 Q470 448 500 408 Q540 366 490 330 Q450 302 470 280 Z"/>
  <!-- moonlight on water -->
  <g stroke="#e7e9d3" stroke-linecap="round">
    <line x1="392" y1="300" x2="428" y2="300" stroke-width="2" opacity="0.3"/>
    <line x1="368" y1="340" x2="420" y2="340" stroke-width="2" opacity="0.24"/>
    <line x1="390" y1="382" x2="448" y2="382" stroke-width="2" opacity="0.2"/>
    <line x1="400" y1="430" x2="452" y2="430" stroke-width="2" opacity="0.15"/>
    <line x1="392" y1="470" x2="436" y2="470" stroke-width="2" opacity="0.1"/>
  </g>
  <!-- banks -->
  <path fill="#0b110b" d="M0 500 L0 300 Q120 288 240 306 Q320 318 355 280 Q380 300 350 330 Q310 368 350 404 Q400 444 360 500 Z"/>
  <path fill="#0b110b" d="M800 500 L800 292 Q700 286 600 302 Q520 314 470 280 Q450 302 490 330 Q540 366 500 408 Q470 448 520 500 Z"/>
  <!-- stones -->
  <g fill="#141a16">
    <ellipse cx="330" cy="418" rx="22" ry="10"/>
    <ellipse cx="530" cy="352" rx="18" ry="9"/>
    <ellipse cx="300" cy="330" rx="15" ry="7"/>
    <ellipse cx="558" cy="452" rx="24" ry="11"/>
  </g>
  <!-- reeds -->
  <g stroke="#152112" stroke-width="2.5" stroke-linecap="round" fill="none">
    <path d="M260 500 q-4 -40 -14 -56"/><path d="M272 500 q0 -44 8 -58"/><path d="M284 500 q8 -34 18 -46"/>
    <path d="M580 500 q-4 -38 -12 -52"/><path d="M592 500 q2 -42 10 -54"/>
    <path d="M100 470 q-4 -30 -12 -42"/><path d="M112 470 q2 -34 8 -44"/>
    <path d="M700 460 q-4 -28 -10 -40"/><path d="M712 460 q2 -32 8 -42"/>
  </g>
  <!-- fireflies -->
  <circle cx="240" cy="380" r="1.8" fill="#3ecf8e" opacity="0.7"/>
  <circle cx="620" cy="400" r="2" fill="#3ecf8e" opacity="0.65"/>
  <circle cx="430" cy="260" r="1.6" fill="#d9a13e" opacity="0.6"/>
</svg>
