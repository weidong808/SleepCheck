<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" preserveAspectRatio="xMidYMid slice">
  <defs>
    <radialGradient id="bg" cx="0.5" cy="0.48" r="0.8">
      <stop offset="0" stop-color="#101816"/>
      <stop offset="0.6" stop-color="#0c1110"/>
      <stop offset="1" stop-color="#090b0a"/>
    </radialGradient>
    <radialGradient id="orb" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#3ecf8e" stop-opacity="0.35"/>
      <stop offset="0.5" stop-color="#3ecf8e" stop-opacity="0.1"/>
      <stop offset="1" stop-color="#3ecf8e" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg)"/>
  <!-- slow ripple rings -->
  <g fill="none" stroke="#3ecf8e">
    <circle cx="400" cy="240" r="60" stroke-opacity="0.22" stroke-width="1.5"/>
    <circle cx="400" cy="240" r="105" stroke-opacity="0.15" stroke-width="1.4"/>
    <circle cx="400" cy="240" r="155" stroke-opacity="0.10" stroke-width="1.3"/>
    <circle cx="400" cy="240" r="210" stroke-opacity="0.065" stroke-width="1.2"/>
    <circle cx="400" cy="240" r="270" stroke-opacity="0.04" stroke-width="1.1"/>
    <circle cx="400" cy="240" r="335" stroke-opacity="0.025" stroke-width="1"/>
  </g>
  <!-- breathing orb -->
  <circle cx="400" cy="240" r="120" fill="url(#orb)"/>
  <circle cx="400" cy="240" r="26" fill="#3ecf8e" opacity="0.5"/>
  <circle cx="400" cy="240" r="12" fill="#bfeedd" opacity="0.55"/>
  <!-- faint drifting stars -->
  <g fill="#cfd8cf">
    <circle cx="120" cy="90" r="1.3" opacity="0.45"/><circle cx="230" cy="400" r="1.2" opacity="0.35"/>
    <circle cx="620" cy="110" r="1.3" opacity="0.4"/><circle cx="700" cy="360" r="1.2" opacity="0.35"/>
    <circle cx="90" cy="300" r="1.1" opacity="0.3"/><circle cx="540" cy="430" r="1.2" opacity="0.3"/>
    <circle cx="330" cy="70" r="1.1" opacity="0.35"/><circle cx="740" cy="200" r="1.1" opacity="0.35"/>
  </g>
  <!-- soft horizon shadow -->
  <path fill="#080a09" d="M0 500 L0 452 Q400 428 800 452 L800 500 Z"/>
</svg>
