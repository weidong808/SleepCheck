<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#15222a"/>
      <stop offset="0.6" stop-color="#0f1a18"/>
      <stop offset="1" stop-color="#0a0d0b"/>
    </linearGradient>
    <radialGradient id="winglow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#f0c26a" stop-opacity="0.6"/>
      <stop offset="1" stop-color="#f0c26a" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="800" height="500" fill="url(#sky)"/>
  <!-- clouds -->
  <ellipse cx="200" cy="70" rx="220" ry="45" fill="#0d151a" opacity="0.8"/>
  <ellipse cx="600" cy="55" rx="260" ry="50" fill="#0d151a" opacity="0.7"/>
  <!-- far pines -->
  <g fill="#0c1410">
    <path d="M40 350 L90 230 L140 350 Z"/>
    <path d="M120 360 L175 235 L230 360 Z"/>
    <path d="M600 355 L655 230 L710 355 Z"/>
    <path d="M690 365 L745 245 L800 365 Z"/>
  </g>
  <!-- ground -->
  <path fill="#0b100c" d="M0 400 Q200 382 420 396 T800 392 L800 500 L0 500 Z"/>
  <!-- cabin -->
  <g>
    <rect x="330" y="320" width="160" height="90" fill="#0c0e10"/>
    <path d="M312 326 L410 252 L508 326 Z" fill="#08090c"/>
    <g stroke="#161a14" stroke-width="2" opacity="0.9">
      <line x1="330" y1="340" x2="490" y2="340"/>
      <line x1="330" y1="360" x2="490" y2="360"/>
      <line x1="330" y1="380" x2="490" y2="380"/>
    </g>
    <rect x="448" y="266" width="15" height="44" fill="#0c0e10"/>
    <path d="M455 258 q12 -16 5 -30 q20 10 11 36 q-7 8 -16 -6Z" fill="#3a4453" opacity="0.35"/>
    <circle cx="365" cy="362" r="32" fill="url(#winglow)"/>
    <circle cx="452" cy="362" r="32" fill="url(#winglow)"/>
    <rect x="352" y="348" width="26" height="27" fill="#e9b45a" opacity="0.92"/>
    <rect x="439" y="348" width="26" height="27" fill="#e9b45a" opacity="0.9"/>
    <line x1="365" y1="348" x2="365" y2="375" stroke="#0c0e10" stroke-width="2"/>
    <line x1="352" y1="361" x2="378" y2="361" stroke="#0c0e10" stroke-width="2"/>
    <line x1="452" y1="348" x2="452" y2="375" stroke="#0c0e10" stroke-width="2"/>
    <line x1="439" y1="361" x2="465" y2="361" stroke="#0c0e10" stroke-width="2"/>
  </g>
  <!-- puddle glints -->
  <g stroke="#8fb0a6" stroke-width="1.5" opacity="0.25" stroke-linecap="round">
    <line x1="300" y1="440" x2="340" y2="440"/>
    <line x1="470" y1="452" x2="520" y2="452"/>
    <line x1="380" y1="466" x2="415" y2="466"/>
  </g>
  <ellipse cx="405" cy="424" rx="110" ry="12" fill="#e9b45a" opacity="0.06"/>
  <!-- rain -->
  <g stroke="#a9c8c0" stroke-opacity="0.16" stroke-width="1.5" stroke-linecap="round">
    <line x1="80" y1="90" x2="70" y2="130"/><line x1="150" y1="160" x2="140" y2="200"/>
    <line x1="230" y1="100" x2="220" y2="140"/><line x1="290" y1="180" x2="280" y2="220"/>
    <line x1="360" y1="110" x2="350" y2="150"/><line x1="430" y1="170" x2="420" y2="210"/>
    <line x1="500" y1="100" x2="490" y2="140"/><line x1="570" y1="160" x2="560" y2="200"/>
    <line x1="640" y1="110" x2="630" y2="150"/><line x1="710" y1="180" x2="700" y2="220"/>
    <line x1="120" y1="260" x2="110" y2="300"/><line x1="260" y1="280" x2="250" y2="320"/>
    <line x1="550" y1="260" x2="540" y2="300"/><line x1="680" y1="290" x2="670" y2="330"/>
    <line x1="760" y1="240" x2="750" y2="280"/><line x1="40" y1="200" x2="30" y2="240"/>
  </g>
</svg>
